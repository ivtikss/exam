    <rect width="1200" height="630" fill="#7F42E1"/>
    <rect x="660" width="540" height="630" fill="#F5F0FF"/>
    <text x="70" y="95" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="1.5">PRODUCT INFORMATION CONTROL</text>
    <text x="70" y="190" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="66" font-weight="700">Robot scanner</text>
    <text x="70" y="268" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="66" font-weight="700">for price label</text>
    <text x="70" y="346" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="66" font-weight="700">control</text>
